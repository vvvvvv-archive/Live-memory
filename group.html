  <meta property="og:type" content="website">

</head>

<body>
  <main>
    <nav class="breadcrumb">
      <a href="index.html">HOME</a> &gt; <span id="group-name-breadcrumb"></span>
    </nav>

    <h1 id="group-name"></h1>

    <section class="search-card">
      <label for="group-search">このグループの思い出を探す</label>
      <input id="group-search" type="search" placeholder="曲名・ライブ名・メンバー名・言葉で探す">
    </section>

    <section class="section-block search-results" id="group-search-results" hidden></section>

    <div class="request-link-row">
      <a href="contact.html">掲載希望・情報提供はこちら▶</a>
    </div>

    <section class="section-block member-directory" id="member-directory" hidden>
      <div class="section-heading">
        <h2>Member</h2>
      </div>
      <div class="member-card-grid" id="member-card-grid"></div>
    </section>

    <section class="section-block" id="group-live-section">
      <div class="section-heading">
        <h2>LIVE</h2>
        <p id="live-count"></p>
      </div>
      <ul class="list" id="live-list"></ul>
    </section>

    <section class="section-block" id="group-stage-section">
      <div class="section-heading">
        <h2>STAGE</h2>
        <p id="stage-count"></p>
      </div>
      <ul class="list" id="stage-list"></ul>
    </section>

    <section class="section-block" id="group-event-section">
      <div class="section-heading">
        <h2>EVENT</h2>
        <p id="event-count"></p>
      </div>
      <ul class="list" id="event-list"></ul>
    </section>
  </main>

  <footer>
    ｖｖｖｖｖｖ　LIVE MEMORY
  </footer>
  <script src="js/site-common.js?v=20260717-usage-footer"></script>
  <script src="js/live-registry.js?v=20260717-video-bonus"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/comment-data.js?v=20260717-video-bonus"></script>
  <script src="js/search.js?v=20260717-member-tag-chips"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("id");

    function renderEmpty(listElement) {
      const li = document.createElement("li");
      li.textContent = "準備中";
      listElement.appendChild(li);
    }

    function formatLiveTitle(title) {
      const match = title.match(/^(.*?\b\d{4})(\s*[～〜].*)$/);
      if (!match) return title;

      return `
        <span class="live-title-main">${match[1]}</span>
        <span class="live-title-sub">${match[2].trim()}</span>
      `;
    }

    function renderLives(listElement, lives, groupId) {
      listElement.innerHTML = "";

      if (lives.length === 0) {
        renderEmpty(listElement);
        return;
      }

      const livesByYear = lives
        .slice()
        .sort((a, b) => {
          if (b.year !== a.year) return b.year - a.year;
          return String(b.id).localeCompare(String(a.id));
        })
        .reduce((groups, live) => {
          const year = String(live.year);
          if (!groups.has(year)) groups.set(year, []);
          groups.get(year).push(live);
          return groups;
        }, new Map());

      livesByYear.forEach((yearLives, year) => {
        const yearItem = document.createElement("li");
        yearItem.className = "year-group";
        yearItem.innerHTML = `<h3 class="year-heading">${year}</h3>`;

        const yearList = document.createElement("ul");
        yearList.className = "year-live-list";

        yearLives.forEach(live => {
          const li = document.createElement("li");
          const a = document.createElement("a");

          a.href = LiveRegistry.detailHref(groupId, live);
          a.className = "live-title-link";
          a.innerHTML = formatLiveTitle(live.title);

          li.appendChild(a);
          yearList.appendChild(li);
        });

        yearItem.appendChild(yearList);
        listElement.appendChild(yearItem);
      });
    }

    function renderMemberCards(members) {
      const section = document.getElementById("member-directory");
      const grid = document.getElementById("member-card-grid");

      if (!section || !grid || !members.length) {
        return;
      }

      grid.innerHTML = "";
      members.forEach(member => {
        const a = document.createElement("a");
        a.className = "member-card";
        a.href = `member.html?member=${member.id}`;
        a.textContent = member.name;
        grid.appendChild(a);
      });

      section.hidden = false;
    }

    function livesByType(lives, type) {
      return lives.filter(live => String(live.type || "").toUpperCase() === type);
    }

    async function init() {
      const { group, lives } = await LiveRegistry.loadGroupLives(groupId);

      SiteCommon.setDocumentTitle(`${group.name} | ｖｖｖｖｖｖ　LIVE MEMORY`);
      document.getElementById("group-name").textContent = group.name;
      document.getElementById("group-name-breadcrumb").textContent = group.name;

      if (groupId === "individual") {
        renderMemberCards(await LiveRegistry.loadMembers());
      }

      const liveItems = livesByType(lives, "LIVE");
      const stageItems = livesByType(lives, "STAGE");
      const eventItems = livesByType(lives, "EVENT");

      if (groupId === "individual") {
        document.getElementById("group-live-section").hidden = true;
        document.getElementById("group-stage-section").hidden = true;
        document.getElementById("group-event-section").hidden = true;
      } else {
        document.getElementById("live-count").textContent = `登録数：${liveItems.length}`;
        document.getElementById("stage-count").textContent = `登録数：${stageItems.length}`;
        document.getElementById("event-count").textContent = `登録数：${eventItems.length}`;

        renderLives(document.getElementById("live-list"), liveItems, groupId);
        renderLives(document.getElementById("stage-list"), stageItems, groupId);
        renderLives(document.getElementById("event-list"), eventItems, groupId);
      }

      const searchResults = lives.flatMap(live => LiveRegistry.buildLiveSearchResults(group, live));
      searchResults.push(
        ...await MemorySearch.loadMemoryResults(item =>
          MemorySearch.isMemoryInGroup(item, groupId)
        )
      );
      const input = document.getElementById("group-search");
      const container = document.getElementById("group-search-results");
      MemorySearch.bindMemberFilteredResults(input, container, searchResults);
    }

    init();
  </script>
</body>
</html>
