<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V6 LIVE MEMORY</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main>
    <nav class="breadcrumb">
      <a href="index.html">HOME</a> &gt; <span id="group-name-breadcrumb"></span>
    </nav>

    <h1 id="group-name"></h1>

    <section class="search-card">
      <label for="group-search">このグループの思い出を探す</label>
      <input id="group-search" type="search" placeholder="曲名・ライブ名・メンバー名・言葉で探す">
    </section>

    <section class="section-block search-results" id="group-search-results" hidden></section>

    <section class="section-block">
      <div class="section-heading">
        <h2>LIVE</h2>
        <p id="live-count"></p>
      </div>
      <ul class="list" id="live-list"></ul>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <h2>STAGE</h2>
        <p id="stage-count"></p>
      </div>
      <ul class="list" id="stage-list"></ul>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <h2>EVENT</h2>
        <p id="event-count"></p>
      </div>
      <ul class="list" id="event-list"></ul>
    </section>
  </main>

  <footer>
    V6 LIVE MEMORY
  </footer>

  <script src="js/search.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("id");

    async function loadJson(path) {
      const response = await fetch(path);
      return response.json();
    }

    function renderEmpty(listElement) {
      const li = document.createElement("li");
      li.textContent = "準備中";
      listElement.appendChild(li);
    }

    function renderLives(listElement, lives, groupId) {
      if (lives.length === 0) {
        renderEmpty(listElement);
        return;
      }

      lives
        .sort((a, b) => b.year - a.year)
        .forEach(live => {
          const li = document.createElement("li");
          const a = document.createElement("a");

          a.href = `live.html?group=${groupId}&live=${live.id}`;
          a.textContent = `${live.year} ${live.title}`;

          li.appendChild(a);
          listElement.appendChild(li);
        });
    }

    function buildLiveResults(group, live) {
      const results = [{
        title: live.title,
        subtitle: `${live.type} / ${live.year}`,
        href: `live.html?group=${group.id}&live=${live.id}`,
        searchText: `${group.name} ${live.type} ${live.year} ${live.title}`
      }];

      live.performances.forEach(performance => {
        results.push({
          title: `${performance.date} ${performance.time}`,
          subtitle: `${live.title} / [${performance.area}] ${performance.venue}`,
          href: `performance.html?group=${group.id}&live=${live.id}&performance=${performance.id}`,
          searchText: `${group.name} ${live.title} ${performance.date} ${performance.time} ${performance.area} ${performance.venue}`
        });
      });

      const setlist = live.setlists.find(s => s.id === "v2") || live.setlists[live.setlists.length - 1];
      setlist.songs.forEach((song, index) => {
        results.push({
          title: `${song.order}. ${song.title}`,
          subtitle: `${live.title} / ${song.artist}${song.note ? " / " + song.note : ""}`,
          href: `song.html?group=${group.id}&live=${live.id}&setlist=${setlist.id}&song=${index}&order=${song.order}`,
          searchText: `${group.name} ${live.title} ${song.order} ${song.title} ${song.artist} ${song.note || ""}`
        });
      });

      live.goods.forEach(goods => {
        results.push({
          title: goods.name,
          subtitle: `${live.title} / ${goods.price.toLocaleString()}円`,
          href: `goods.html?group=${group.id}&live=${live.id}&goods=${goods.id}`,
          searchText: `${group.name} ${live.title} ${goods.name} ${goods.price}円 グッズ goods`
        });
      });

      return results;
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);

      document.title = `${group.name} | V6 LIVE MEMORY`;
      document.getElementById("group-name").textContent = group.name;
      document.getElementById("group-name-breadcrumb").textContent = group.name;

      let liveItems = [];

      if (groupId === "20th-century") {
        const live = await loadJson("data/lives/20th-century/utauhito-odoruhito-2026.json");
        liveItems = [live];
      }

      const stageItems = [];
      const eventItems = [];

      document.getElementById("live-count").textContent = `登録数：${liveItems.length}`;
      document.getElementById("stage-count").textContent = `登録数：${stageItems.length}`;
      document.getElementById("event-count").textContent = `登録数：${eventItems.length}`;

      renderLives(document.getElementById("live-list"), liveItems, groupId);
      renderLives(document.getElementById("stage-list"), stageItems, groupId);
      renderLives(document.getElementById("event-list"), eventItems, groupId);

      const searchResults = liveItems.flatMap(live => buildLiveResults(group, live));
      searchResults.push(
        ...await MemorySearch.loadMemoryResults(item =>
          MemorySearch.isMemoryInGroup(item, groupId)
        )
      );
      const input = document.getElementById("group-search");
      const container = document.getElementById("group-search-results");
      input.addEventListener("input", () => {
        MemorySearch.renderResults(container, searchResults, input.value);
      });
    }

    init();
  </script>
</body>
</html>
