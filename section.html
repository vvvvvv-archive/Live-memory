<head>

  <meta property="og:type" content="website">
  <meta property="og:title" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta property="og:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">

  <link rel="stylesheet" href="css/style.css?v=20260713-member-filter-all">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="section-title"></h1>
      <p id="section-description"></p>
    </section>

    <section class="search-card">
      <label for="section-search">このページの思い出を探す</label>
      <input id="section-search" type="search" placeholder="曲名・メンバー名・言葉で探す">
    </section>

    <section class="section-block search-results" id="section-memory-search-results" hidden></section>

    <section class="section-block" id="content"></section>
  </main>

  <footer>
    ｖｖｖｖｖｖ　LIVE MEMORY
  </footer>
  <script src="js/site-common.js?v=20260713-ogp"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/comment-data.js?v=20260713-rpc-stage2"></script>
  <script src="js/search.js?v=20260713-member-filter-all"></script>
  <script src="js/comment-tools.js?v=20260713-contact-report"></script>
  <script src="js/prototype-comments.js?v=20260714-reactions"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");
    const sectionId = params.get("section");

    if (sectionId === "video") {
      location.replace(`video.html?group=${groupId}&live=${liveId}`);
    }

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      return response.json();
    }

    function createCard(title, subtitle, href) {
      const a = document.createElement("a");
      a.className = "archive-card";
      a.href = href;
      a.innerHTML = `
        <h3>${title}</h3>
        <p>${subtitle}</p>
      `;
      return a;
    }

    function appendGiscus(container, memoryId) {
      appendPrototypeCommentsIfEnabled(container, groupId, liveId, memoryId, {
        afterForm: [createMemoryGuidelines(), createPostManagementLink()]
      });
    }

    function createMemoryGuidelines() {
      const guidelines = document.createElement("div");
      guidelines.className = "memory-guidelines";
      guidelines.innerHTML = `
        <h3>思い出を残すときのお願い</h3>
        <ul>
          <li>他の人や出演者を傷つける内容、公序良俗に反する内容はご遠慮ください。</li>
          <li>誰かから聞いた話ではなく、ご自身が体験した内容を書いてください。</li>
          <li>投稿前に、一度ご自身の文章を読み返してご確認ください。</li>
        </ul>
        <p>ルールを守って、<br>みんなでしあわせな思い出を共有しましょう。</p>
      `;
      return guidelines;
    }

    function appendMemoryBlock(container, heading, description, memoryId) {
      const block = document.createElement("section");
      block.className = "section-block";
      block.innerHTML = `
        <div class="section-heading">
          <h2>${heading}</h2>
        </div>
        <div class="giscus-container"></div>
      `;
      container.appendChild(block);
      appendGiscus(block.querySelector(".giscus-container"), memoryId);
      return block;
    }

    function generalSongHref(setlist, song, index) {
      return `song.html?group=${groupId}&live=${liveId}&setlist=${setlist.id}&song=${index}&order=${song.order}`;
    }

    function videoSongHref(setlist, song, index) {
      return `video-song.html?group=${groupId}&live=${liveId}&setlist=${setlist.id}&song=${index}&order=${song.order}`;
    }

    function leadDescription(sectionId, fallback) {
      const descriptions = {
        general: "ツアー全体の思い出や、曲ごとの思い出を残す場所です。",
        schedule: "各公演ごとのMC、ファンサ、その他の思い出を残す場所です。",
        goods: "販売されたグッズに関する思い出を残す場所です。"
      };

      return descriptions[sectionId] || fallback;
    }

    function appendSetlist(container, live, searchableCards, songHrefBuilder, setlist) {
      const heading = document.createElement("div");
      heading.className = "section-heading";
      heading.innerHTML = `
        <h2>${setlist.label || "セットリスト"}</h2>
      `;
      container.appendChild(heading);

      const grid = document.createElement("div");
      grid.className = "archive-grid";

      setlist.songs.forEach((song, index) => {
        const title = `${song.order}. ${song.title}`;
        const sectionLabel = song.section === "encore" ? "Encore" : "";
        const note = song.note ? ` / ${song.note}` : "";
        const artist = song.artist ? song.artist : "";
        const subtitle = `${artist}${note}${sectionLabel ? " / " + sectionLabel : ""}`;
        const href = songHrefBuilder(setlist, song, index);
        const card = createCard(title, subtitle, href);
        card.dataset.search = `${live.title} ${title} ${subtitle}`;
        searchableCards.push(card);
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    function generalSetlists(live) {
      if (Array.isArray(live.generalSetlistIds) && live.generalSetlistIds.length) {
        return live.generalSetlistIds
          .map(id => live.setlists.find(setlist => setlist.id === id))
          .filter(Boolean);
      }

      return [
        live.setlists.find(s => s.id === "v2") || live.setlists[live.setlists.length - 1]
      ];
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);
      const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);
      const section = live.sections.find(s => s.id === sectionId);

      SiteCommon.setDocumentTitle(`${section.label} | ${live.title} | ｖｖｖｖｖｖ　LIVE MEMORY`);

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${group.id}">${group.name}</a> &gt;
        <a href="live.html?group=${group.id}&live=${live.id}">${live.title}</a> &gt;
        ${section.label}
      `;

      document.getElementById("section-title").textContent = section.label;
      document.getElementById("section-description").textContent = leadDescription(sectionId, section.description);

      const content = document.getElementById("content");
      const searchableCards = [];

      if (sectionId === "video") {
        sessionStorage.setItem("lastMemorySection", "video");
      } else {
        sessionStorage.removeItem("lastMemorySection");
      }

      if (sectionId === "schedule") {
        const heading = document.createElement("div");
        heading.className = "section-heading";
        heading.innerHTML = `
          <h2>公演一覧</h2>
          <p>${live.performances.length}公演</p>
        `;
        content.appendChild(heading);

        const grid = document.createElement("div");
        grid.className = "archive-grid";

        live.performances.forEach(performance => {
          const title = `${performance.date} ${performance.time}`;
          const subtitle = `[${performance.area}] ${performance.venue}${performance.performanceType ? " / " + performance.performanceType : ""}`;
          const href = `performance.html?group=${groupId}&live=${liveId}&performance=${performance.id}`;
          const card = createCard(title, subtitle, href);
          card.dataset.search = `${live.title} ${title} ${subtitle}`;
          searchableCards.push(card);
          grid.appendChild(card);
        });

        content.appendChild(grid);
      }

      if (sectionId === "general") {
        generalSetlists(live).forEach(setlist => {
          appendSetlist(content, live, searchableCards, generalSongHref, setlist);
        });

        const memoryBlock = appendMemoryBlock(
          content,
          "ライブ全体の思い出",
          "このライブ全体について思い出を記録できます。",
          `section:${groupId}:${liveId}:general`
        );
        memoryBlock.dataset.search = `${live.title} ライブ全体 総合 思い出`;
        searchableCards.push(memoryBlock);
      }

      if (sectionId === "video") {
        const setlist = live.video?.setlist?.length
          ? { id: "video", label: "セットリスト", songs: live.video.setlist }
          : live.setlists.find(s => s.id === "v2") || live.setlists[live.setlists.length - 1];
        appendSetlist(content, live, searchableCards, videoSongHref, setlist);
      }

      if (sectionId === "goods") {
        const heading = document.createElement("div");
        heading.className = "section-heading";
        heading.innerHTML = `
          <h2>グッズ一覧</h2>
          <p>${live.goods.length}件</p>
        `;
        content.appendChild(heading);

        const grid = document.createElement("div");
        grid.className = "archive-grid";

        if (live.goods.length === 0) {
          const card = document.createElement("div");
          card.className = "archive-card";
          card.innerHTML = `
            <h3>準備中</h3>
            <p>グッズ情報は確認中です。</p>
          `;
          card.dataset.search = `${live.title} グッズ goods 準備中`;
          searchableCards.push(card);
          grid.appendChild(card);
        } else {
          live.goods.forEach(goods => {
            const title = goods.name;
            const subtitle = goods.priceLabel || `${goods.price.toLocaleString()}円`;
            const href = `goods.html?group=${groupId}&live=${liveId}&goods=${goods.id}`;
            const card = createCard(title, subtitle, href);
            card.dataset.search = `${live.title} ${goods.name} ${subtitle} ${goods.price}円 グッズ goods`;
            searchableCards.push(card);
            grid.appendChild(card);
          });
        }

        content.appendChild(grid);

        const memoryBlock = appendMemoryBlock(
          content,
          "グッズ情報と思い出",
          "このライブで発売されたグッズの情報と思い出を記録できます。",
          `section:${groupId}:${liveId}:goods`
        );
        memoryBlock.dataset.search = `${live.title} グッズ goods 情報 思い出`;
        searchableCards.push(memoryBlock);
      }

      const empty = document.createElement("p");
      empty.className = "search-empty";
      empty.textContent = "一致する思い出の入口は見つかりませんでした。";
      empty.hidden = true;
      content.appendChild(empty);

      const input = document.getElementById("section-search");
      const memoryResults = await MemorySearch.loadMemoryResults(item =>
        MemorySearch.isMemoryInSection(item, groupId, liveId, sectionId)
      );
      const memoryResultsContainer = document.getElementById("section-memory-search-results");

      MemorySearch.bindCardFilter(
        input,
        searchableCards,
        { emptyElement: empty }
      );
      MemorySearch.bindMemberFilteredResults(input, memoryResultsContainer, memoryResults);
    }

    init();
  </script>
</body>
</html>
