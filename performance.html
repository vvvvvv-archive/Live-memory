<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:site_name" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta property="og:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">
  <meta property="og:url" content="https://vvvvvv-archive.github.io/Live-memory/">
  <meta property="og:image" content="https://vvvvvv-archive.github.io/Live-memory/assets/images/ogp.png">
  <meta property="og:image:alt" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta name="twitter:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">

  <link rel="stylesheet" href="css/style.css?v=20260717-comment-target">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="performance-title"></h1>
      <p id="performance-venue"></p>
    </section>

    <section class="search-card">
      <label for="performance-search">この公演の思い出を探す</label>
      <input id="performance-search" type="search" placeholder="曲名・メンバー名・言葉で探す">
    </section>

    <section class="section-block setlist-checking-notice" id="setlist-checking-notice" hidden>
      <p>この公演のセットリストは確認中です。</p>
    </section>

    <section class="section-block search-results" id="performance-memory-search-results" hidden></section>

    <section class="section-block">
      <div class="archive-grid">
        <a class="archive-card" id="mc-link">
          <h3>MC</h3>
          <p>思い出を記録する</p>
        </a>
        <a class="archive-card" id="fanservice-link">
          <h3>ファンサ</h3>
          <p>思い出を記録する</p>
        </a>
        <a class="archive-card" id="other-link">
          <h3>その他</h3>
          <p>思い出を記録する</p>
        </a>
      </div>
      <p class="search-empty" id="performance-search-empty" hidden>一致する思い出の入口は見つかりませんでした。</p>
    </section>
  </main>

  <footer>ｖｖｖｖｖｖ　LIVE MEMORY</footer>
  <script src="js/site-common.js?v=20260713-ogp"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/comment-data.js?v=20260717-video-bonus"></script>
  <script src="js/search.js?v=20260717-video-bonus"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");
    const performanceId = params.get("performance");

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      return response.json();
    }

    function formatDisplayDate(date) {
      return String(date || "").replace(/-/g, "/");
    }

    function formatDisplayDateTime(performance) {
      return [formatDisplayDate(performance?.date), performance?.time].filter(Boolean).join(" ");
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);
      const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);
      const performance = live.performances.find(p => p.id === performanceId);
      const displayDateTime = formatDisplayDateTime(performance);

      SiteCommon.setDocumentTitle(`${displayDateTime} | ${live.title} | ｖｖｖｖｖｖ　LIVE MEMORY`);

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${group.id}">${group.name}</a> &gt;
        <a href="live.html?group=${group.id}&live=${live.id}">${live.title}</a> &gt;
        <a href="section.html?group=${group.id}&live=${live.id}&section=schedule">公演日程</a> &gt;
        ${displayDateTime}
      `;

      document.getElementById("performance-title").textContent =
        displayDateTime;

      document.getElementById("performance-venue").textContent =
        `[${performance.area}] ${performance.venue}${performance.performanceType ? " / " + performance.performanceType : ""}`;

      const setlistNotice = document.getElementById("setlist-checking-notice");
      setlistNotice.hidden = !(
        performance.setlistStatus === "checking" ||
        performance.setlistRegistered === false ||
        performance.setlistId === null
      );

      document.getElementById("mc-link").href =
        `memory.html?group=${groupId}&live=${liveId}&performance=${performanceId}&type=mc`;

      document.getElementById("fanservice-link").href =
        `memory.html?group=${groupId}&live=${liveId}&performance=${performanceId}&type=fanservice`;

      document.getElementById("other-link").href =
        `memory.html?group=${groupId}&live=${liveId}&performance=${performanceId}&type=other`;

      const cards = [
        document.getElementById("mc-link"),
        document.getElementById("fanservice-link"),
        document.getElementById("other-link")
      ];

      cards[0].dataset.search = `${live.title} ${displayDateTime} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} ${performance.performanceType || ""} MC`;
      cards[1].dataset.search = `${live.title} ${displayDateTime} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} ${performance.performanceType || ""} ファンサ fanservice`;
      cards[2].dataset.search = `${live.title} ${displayDateTime} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} ${performance.performanceType || ""} その他 other`;

      const input = document.getElementById("performance-search");
      const memoryResults = await MemorySearch.loadMemoryResults(item =>
        MemorySearch.isMemoryInPerformance(item, groupId, liveId, performanceId)
      );
      const memoryResultsContainer = document.getElementById("performance-memory-search-results");

      MemorySearch.bindCardFilter(
        input,
        cards,
        { emptyElement: document.getElementById("performance-search-empty") }
      );
      MemorySearch.bindMemberFilteredResults(input, memoryResultsContainer, memoryResults);

    }

    init();
  </script>
</body>
</html>
