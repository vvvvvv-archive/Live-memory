<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V6 LIVE MEMORY</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="performance-title"></h1>
      <p id="performance-venue"></p>
    </section>

    <section class="search-card">
      <label for="performance-search">この公演の思い出を探す</label>
      <input id="performance-search" type="search" placeholder="曲名・メンバー名・言葉で探す">
    </section>

    <section class="section-block">
      <div class="archive-grid">
        <a class="archive-card" id="mc-link">
          <h3>MC</h3>
          <p>思い出を記録する</p>
        </a>
        <a class="archive-card" id="fanservice-link">
          <h3>ファンサ</h3>
          <p>思い出を記録する</p>
        </a>
        <a class="archive-card" id="other-link">
          <h3>その他</h3>
          <p>思い出を記録する</p>
        </a>
      </div>
      <p class="search-empty" id="performance-search-empty" hidden>一致する思い出の入口は見つかりませんでした。</p>
    </section>
  </main>

  <footer>V6 LIVE MEMORY</footer>

  <script src="js/search.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");
    const performanceId = params.get("performance");

    async function loadJson(path) {
      const response = await fetch(path);
      return response.json();
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);
      const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);
      const performance = live.performances.find(p => p.id === performanceId);

      document.title = `${performance.date} ${performance.time} | ${live.title} | V6 LIVE MEMORY`;

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${group.id}">${group.name}</a> &gt;
        <a href="live.html?group=${group.id}&live=${live.id}">${live.title}</a> &gt;
        <a href="section.html?group=${group.id}&live=${live.id}&section=schedule">公演日程</a> &gt;
        ${performance.date} ${performance.time}
      `;

      document.getElementById("performance-title").textContent =
        `${performance.date} ${performance.time}`;

      document.getElementById("performance-venue").textContent =
        `[${performance.area}] ${performance.venue}`;

      document.getElementById("mc-link").href =
        `memory.html?group=${groupId}&live=${liveId}&performance=${performanceId}&type=mc`;

      document.getElementById("fanservice-link").href =
        `memory.html?group=${groupId}&live=${liveId}&performance=${performanceId}&type=fanservice`;

      document.getElementById("other-link").href =
        `memory.html?group=${groupId}&live=${liveId}&performance=${performanceId}&type=other`;

      const cards = [
        document.getElementById("mc-link"),
        document.getElementById("fanservice-link"),
        document.getElementById("other-link")
      ];

      cards[0].dataset.search = `${live.title} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} MC`;
      cards[1].dataset.search = `${live.title} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} ファンサ fanservice`;
      cards[2].dataset.search = `${live.title} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} その他 other`;

      MemorySearch.bindCardFilter(
        document.getElementById("performance-search"),
        cards,
        { emptyElement: document.getElementById("performance-search-empty") }
      );

    }

    init();
  </script>
</body>
</html>
