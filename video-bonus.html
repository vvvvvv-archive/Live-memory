<head>

  <link rel="stylesheet" href="css/style.css?v=20260717-video-bonus">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="bonus-title"></h1>
      <p id="bonus-disc-title"></p>
      <p id="bonus-edition"></p>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <h2>思い出</h2>
      </div>
      <div id="giscus-container"></div>
    </section>
  </main>

  <footer>
    ｖｖｖｖｖｖ　LIVE MEMORY
  </footer>
  <script src="js/site-common.js?v=20260713-ogp"></script>
  <script src="js/comment-tools.js?v=20260713-contact-report"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/prototype-comments.js?v=20260717-video-bonus"></script>
  <script src="js/memory-ids.js?v=20260717-video-bonus"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");
    const bonusId = params.get("bonus");

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path}`);
      }
      return response.json();
    }

    function bonusPageId(item) {
      return item.pageId || item.id;
    }

    function findBonusItem(live, id) {
      for (const section of live.video?.bonusSections || []) {
        const item = (section.items || []).find(candidate => candidate.id === id || bonusPageId(candidate) === id);
        if (item) {
          return { section, item };
        }
      }
      return null;
    }

    function videoDiscTitle(live) {
      return live.video?.mainFeature?.title || live.title;
    }

    function createMemoryGuidelines() {
      const guidelines = document.createElement("div");
      guidelines.className = "memory-guidelines";
      guidelines.innerHTML = `
        <h3>思い出を残すときのお願い</h3>
        <ul>
          <li>他の人や出演者を傷つける内容、公序良俗に反する内容はご遠慮ください。</li>
          <li>誰かから聞いた話ではなく、ご自身が体験した内容を書いてください。</li>
          <li>投稿前に、一度ご自身の文章を読み返してご確認ください。</li>
        </ul>
        <p>ルールを守って、<br>みんなでしあわせな思い出を共有しましょう。</p>
      `;
      return guidelines;
    }

    async function init() {
      try {
        const groups = await loadJson("data/groups.json");
        const group = groups.find(g => g.id === groupId);
        const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);
        const bonus = findBonusItem(live, bonusId);

        if (!group || !live || !bonus) {
          SiteCommon.showPageError("特典映像が見つかりません", "指定された特典映像の情報が見つかりませんでした。");
          return;
        }

        SiteCommon.setDocumentTitle(`${bonus.item.title} | 特典映像 | ${live.title} | ｖｖｖｖｖｖ　LIVE MEMORY`);

        document.getElementById("breadcrumb").innerHTML = `
          <a href="index.html">HOME</a> &gt;
          <a href="group.html?id=${group.id}">${group.name}</a> &gt;
          <a href="live.html?group=${group.id}&live=${live.id}">${live.title}</a> &gt;
          <a href="video.html?group=${group.id}&live=${live.id}">映像・円盤</a> &gt;
          ${bonus.section.title} &gt;
          ${bonus.item.title}
        `;

        document.getElementById("bonus-title").textContent = bonus.item.title;
        document.getElementById("bonus-disc-title").textContent = `映像・円盤：${videoDiscTitle(live)}`;
        document.getElementById("bonus-edition").textContent = `収録形態：${bonus.section.title}`;

        const memoryId = videoBonusMemoryId(groupId, liveId, bonusPageId(bonus.item));
        appendPrototypeCommentsIfEnabled(document.getElementById("giscus-container"), groupId, liveId, memoryId, {
          afterForm: [createMemoryGuidelines(), createPostManagementLink()]
        });
      } catch (error) {
        console.error(error);
        SiteCommon.showPageError("読み込みに失敗しました", "時間をおいてもう一度お試しください。");
      }
    }

    init();
  </script>
</body>
</html>
