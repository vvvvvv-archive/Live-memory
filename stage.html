<head>

  <meta property="og:type" content="website">
  <meta property="og:title" content="STAGE | ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta property="og:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">

  <link rel="stylesheet" href="css/style.css?v=20260719-delete-confirm">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="stage-title"></h1>
      <p class="official-link" id="official-link"></p>
    </section>

    <section class="section-block" id="stage-schedule">
      <details class="stage-schedule-accordion">
        <summary>公演日程</summary>
        <div class="stage-schedule-body" id="stage-schedule-body"></div>
      </details>
    </section>

    <section class="section-block" id="stage-memory">
      <div class="section-heading">
        <h2>思い出</h2>
      </div>
      <div class="giscus-container" id="giscus-container"></div>
    </section>
  </main>

  <footer>ｖｖｖｖｖｖ　LIVE MEMORY</footer>
  <script src="js/site-common.js?v=20260717-usage-footer"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/comment-tools.js?v=20260713-contact-report"></script>
  <script src="js/prototype-comments.js?v=20260719-delete-confirm"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path}`);
      }
      return response.json();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatFullDisplayDate(date) {
      return String(date || "").replace(/-/g, "/");
    }

    function formatShortDisplayDate(date) {
      const value = String(date || "");
      const match = value.match(/^\d{4}-(\d{2})-(\d{2})$/);
      return match ? `${match[1]}/${match[2]}` : formatFullDisplayDate(value);
    }

    function formatDisplayDateTime(item) {
      return [formatShortDisplayDate(item.date), item.time].filter(Boolean).join(" ");
    }

    function performanceYear(performance) {
      return String(performance?.date || "").slice(0, 4);
    }

    function hasMultiplePerformanceYears(performances = []) {
      return new Set(performances.map(performanceYear).filter(Boolean)).size > 1;
    }

    function renderScheduleItems(items = [], showYearHeadings = false) {
      let currentYear = "";
      return items.map(item => {
        const year = performanceYear(item);
        const yearHeading = showYearHeadings && year !== currentYear
          ? `<li class="schedule-year-heading stage-schedule-year">${escapeHtml(year)}</li>`
          : "";
        if (showYearHeadings && year !== currentYear) {
          currentYear = year;
        }
        return `
          ${yearHeading}
          <li>
            <time datetime="${escapeHtml(item.date)}">${escapeHtml(formatDisplayDateTime(item))}</time>
          </li>
        `;
      }).join("");
    }

    function createMemoryGuidelines() {
      const guidelines = document.createElement("div");
      guidelines.className = "memory-guidelines";
      guidelines.innerHTML = `
        <h3>思い出を残すときのお願い</h3>
        <ul>
          <li>他の人や出演者を傷つける内容、公序良俗に反する内容はご遠慮ください。</li>
          <li>誰かから聞いた話ではなく、ご自身が体験した内容を書いてください。</li>
          <li>投稿前に、一度ご自身の文章を読み返してご確認ください。</li>
        </ul>
        <p>ルールを守って、<br>みんなでしあわせな思い出を共有しましょう。</p>
      `;
      return guidelines;
    }

    function groupPerformances(performances = []) {
      return performances.reduce((groups, performance) => {
        const key = `${performance.area || ""}::${performance.venue || ""}`;
        if (!groups.has(key)) {
          groups.set(key, {
            area: performance.area || "",
            venue: performance.venue || "",
            items: []
          });
        }
        groups.get(key).items.push(performance);
        return groups;
      }, new Map());
    }

    function renderSchedule(performances = []) {
      const body = document.getElementById("stage-schedule-body");
      const groups = [...groupPerformances(performances).values()];

      if (!groups.length) {
        body.innerHTML = `<p class="search-empty">公演日程は確認中です。</p>`;
        return;
      }

      const showYearHeadings = hasMultiplePerformanceYears(performances);

      body.innerHTML = groups.map(group => `
        <section class="stage-schedule-venue">
          <h3>【${escapeHtml(group.area)}】</h3>
          <p class="stage-schedule-venue-name">${escapeHtml(group.venue)}</p>
          <ul class="stage-schedule-list">
            ${renderScheduleItems(group.items, showYearHeadings)}
          </ul>
        </section>
      `).join("");
    }

    async function init() {
      const [groups, live] = await Promise.all([
        loadJson("data/groups.json"),
        loadJson(`data/lives/${groupId}/${liveId}.json`)
      ]);
      const group = groups.find(item => item.id === groupId);

      if (!group || !live || String(live.type || "").toUpperCase() !== "STAGE") {
        SiteCommon.showPageError("舞台ページを表示できません", "指定された舞台情報が見つかりませんでした。");
        return;
      }

      SiteCommon.setDocumentTitle(`${live.title} | ｖｖｖｖｖｖ　LIVE MEMORY`);
      SiteCommon.setPageMeta({
        title: `${live.title} | ｖｖｖｖｖｖ　LIVE MEMORY`,
        description: `${live.title}の思い出を残すページです。`
      });

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${escapeHtml(group.id)}">${escapeHtml(group.name)}</a> &gt;
        ${escapeHtml(live.type)} &gt;
        ${escapeHtml(live.title)}
      `;

      document.getElementById("stage-title").textContent = live.title;

      const officialLink = document.getElementById("official-link");
      if (live.officialUrl) {
        officialLink.innerHTML = `
          <a href="${escapeHtml(live.officialUrl)}" target="_blank" rel="noopener noreferrer">
            公式サイトを確認する ↗
          </a>
        `;
      }

      appendPrototypeCommentsIfEnabled(
        document.getElementById("giscus-container"),
        groupId,
        liveId,
        `stage:${groupId}:${liveId}`,
        {
          afterForm: [createMemoryGuidelines(), createPostManagementLink()]
        }
      );

      renderSchedule(live.performances);
    }

    init();
  </script>
</body>
</html>
