<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIVE | V6 LIVE MEMORY</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="live-year"></h1>
      <h2 id="live-title"></h2>
      <p id="official-link"></p>
    </section>

    <section class="search-card">
      <label for="live-search">このライブの思い出を探す</label>
      <input id="live-search" type="search" placeholder="曲名・メンバー名・言葉で探す">
    </section>

    <section class="section-block">
      <div class="archive-grid" id="section-links"></div>
    </section>
  </main>

  <footer>
    V6 LIVE MEMORY
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");

    async function loadJson(path) {
      const response = await fetch(path);
      return response.json();
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);
      const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);

      document.title = `${live.title} | V6 LIVE MEMORY`;

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${group.id}">${group.name}</a> &gt;
        ${live.type} &gt;
        ${live.title}
      `;

      document.getElementById("live-year").textContent = live.year;
      document.getElementById("live-title").textContent = live.title;

      document.getElementById("official-link").innerHTML = `
        <a href="${live.officialUrl}" target="_blank" rel="noopener">
          公式サイトで確認する
        </a>
      `;

      const sectionLinks = document.getElementById("section-links");

      live.sections.forEach(section => {
        const card = document.createElement("a");
        card.className = "archive-card";
        card.href = `section.html?group=${groupId}&live=${liveId}&section=${section.id}`;

        let subText = section.description;

        if (section.id === "schedule") {
          subText = `${live.performances.length}公演`;
        }

        if (section.id === "goods") {
          subText = `登録グッズ ${live.goods.length}件`;
        }

        if (section.id === "video") {
          subText = "映像作品の思い出";
        }

        card.innerHTML = `
          <h3>${section.label}</h3>
          <p>${subText}</p>
        `;

        sectionLinks.appendChild(card);
      });
    }

    init();
  </script>
</body>
</html>
