<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIVE | ｖｖｖｖｖｖ　LIVE MEMORY</title>
  <meta name="description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">
  <meta property="og:site_name" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta property="og:type" content="website">
  <meta property="og:title" content="LIVE | ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta property="og:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">
  <meta property="og:url" content="https://vvvvvv-archive.github.io/Live-memory/">
  <meta property="og:image" content="https://vvvvvv-archive.github.io/Live-memory/assets/images/ogp.png">
  <meta property="og:image:alt" content="ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LIVE | ｖｖｖｖｖｖ　LIVE MEMORY">
  <meta name="twitter:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">
  <meta name="twitter:image" content="https://vvvvvv-archive.github.io/Live-memory/assets/images/ogp.png">

  <link rel="stylesheet" href="css/style.css?v=20260713-member-filter-all">
</head>

<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="live-year"></h1>
      <h2 id="live-title"></h2>
      <p id="official-link"></p>
    </section>

    <section class="search-card">
      <label for="live-search">このライブの思い出を探す</label>
      <input id="live-search" type="search" placeholder="曲名・メンバー名・言葉で探す">
    </section>

    <section class="section-block search-results" id="live-search-results" hidden></section>

    <section class="section-block">
      <div class="archive-grid" id="section-links"></div>
    </section>
  </main>

  <footer>
    ｖｖｖｖｖｖ　LIVE MEMORY
  </footer>
  <script src="js/site-common.js?v=20260713-ogp"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/comment-data.js?v=20260713-rpc-stage2"></script>
  <script src="js/search.js?v=20260713-member-filter-all"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      return response.json();
    }

    function sectionHref(sectionId) {
      if (sectionId === "video") {
        return `video.html?group=${groupId}&live=${liveId}`;
      }

      return `section.html?group=${groupId}&live=${liveId}&section=${sectionId}`;
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);
      const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);

      SiteCommon.setDocumentTitle(`${live.title} | ｖｖｖｖｖｖ　LIVE MEMORY`);

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${group.id}">${group.name}</a> &gt;
        ${live.type} &gt;
        ${live.title}
      `;

      document.getElementById("live-year").textContent = live.year;
      document.getElementById("live-title").textContent = live.title;

      const officialLink = document.getElementById("official-link");
      officialLink.innerHTML = "";
      if (live.officialUrl) {
        officialLink.innerHTML = `
          <a href="${live.officialUrl}" target="_blank" rel="noopener noreferrer">
            公式サイトで詳細を見る ↗
          </a>
        `;
      }

      const sectionLinks = document.getElementById("section-links");

      live.sections.forEach(section => {
        const card = document.createElement("a");
        card.className = "archive-card";
        card.href = sectionHref(section.id);

        let subText = section.description;

        if (section.id === "general") {
          subText = "ツアー全体の思い出や、曲ごとの思い出";
        }

        if (section.id === "schedule") {
          subText = "各公演ごとのMC、ファンサ、その他の思い出";
        }

        if (section.id === "goods") {
          subText = "グッズの思い出";
        }

        if (section.id === "video") {
          subText = "ライブ映像、特典映像を観た思い出";
        }

        card.innerHTML = `
          <h3>${section.label}</h3>
          <p>${subText}</p>
        `;

        sectionLinks.appendChild(card);
      });

      const searchResults = [];

      live.sections.forEach(section => {
        searchResults.push({
          title: section.label,
          subtitle: section.description,
          href: sectionHref(section.id),
          searchText: `${live.title} ${section.label} ${section.description}`
        });
      });

      live.performances.forEach(performance => {
        searchResults.push({
          title: `${performance.date} ${performance.time}`,
          subtitle: `[${performance.area}] ${performance.venue}${performance.performanceType ? " / " + performance.performanceType : ""}`,
          href: `performance.html?group=${groupId}&live=${liveId}&performance=${performance.id}`,
          searchText: `${live.title} ${performance.date} ${performance.time} ${performance.area} ${performance.venue} ${performance.performanceType || ""}`
        });
      });

      const generalSetlists = Array.isArray(live.generalSetlistIds) && live.generalSetlistIds.length
        ? live.generalSetlistIds.map(id => live.setlists.find(setlist => setlist.id === id)).filter(Boolean)
        : [live.setlists.find(s => s.id === "v2") || live.setlists[live.setlists.length - 1]];
      generalSetlists.forEach(setlist => {
        setlist.songs.forEach((song, index) => {
          const setlistLabel = setlist.label || setlist.name || "";
          searchResults.push({
            title: `${song.order}. ${song.title}`,
            subtitle: `${setlistLabel ? setlistLabel + " / " : ""}${song.artist}${song.note ? " / " + song.note : ""}`,
            href: `song.html?group=${groupId}&live=${liveId}&setlist=${setlist.id}&song=${index}&order=${song.order}`,
            searchText: `${live.title} ${setlistLabel} ${song.order} ${song.title} ${song.artist} ${song.note || ""}`
          });
        });
      });

      live.goods.forEach(goods => {
        const priceText = goods.priceLabel || `${goods.price.toLocaleString()}円`;
        searchResults.push({
          title: goods.name,
          subtitle: priceText,
          href: `goods.html?group=${groupId}&live=${liveId}&goods=${goods.id}`,
          searchText: `${live.title} ${goods.name} ${priceText} ${goods.price}円 グッズ goods`
        });
      });

      searchResults.push(
        ...await MemorySearch.loadMemoryResults(item =>
          MemorySearch.isMemoryInLive(item, groupId, liveId)
        )
      );

      const input = document.getElementById("live-search");
      const container = document.getElementById("live-search-results");
      MemorySearch.bindMemberFilteredResults(input, container, searchResults);
    }

    init();
  </script>
</body>
</html>
