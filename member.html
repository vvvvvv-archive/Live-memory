  <meta name="twitter:title" content="MEMBER | v v v v v v LIVE MEMORY">
  <meta name="twitter:description" content="V6、20th Century、Coming Century、そして6人それぞれの活動に関する記憶を未来へ残すための非公式ファンアーカイブ">

</head>

<body>
  <main>
    <nav class="breadcrumb">
      <a href="index.html">HOME</a> &gt;
      <a href="group.html?id=individual">Individual</a> &gt;
      <span id="member-name-breadcrumb"></span>
    </nav>

    <h1 id="member-name"></h1>

    <section class="search-card">
      <label for="member-search">このメンバーの思い出を探す</label>
      <input id="member-search" type="search" placeholder="曲名・ライブ名・言葉で探す">
    </section>

    <section class="section-block search-results" id="member-search-results" hidden></section>

    <section class="section-block">
      <div class="section-heading">
        <h2>STAGE</h2>
        <p id="stage-count"></p>
      </div>
      <ul class="list" id="stage-list"></ul>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <h2>EVENT</h2>
        <p id="event-count"></p>
      </div>
      <ul class="list" id="event-list"></ul>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <h2>LIVE</h2>
        <p id="live-count"></p>
      </div>
      <ul class="list" id="live-list"></ul>
    </section>
  </main>

  <footer>
    v v v v v v LIVE MEMORY
  </footer>
  <script src="js/site-common.js?v=20260713-ogp"></script>
  <script src="js/live-registry.js?v=20260717-date-format"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/comment-data.js?v=20260717-date-format"></script>
  <script src="js/search.js?v=20260717-date-format"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const memberId = params.get("member");

    function renderEmpty(listElement) {
      const li = document.createElement("li");
      li.textContent = "準備中";
      listElement.appendChild(li);
    }

    function formatLiveTitle(title) {
      const match = title.match(/^(.*?\b\d{4})(\s*[～〜].*)$/);
      if (!match) return title;

      return `
        <span class="live-title-main">${match[1]}</span>
        <span class="live-title-sub">${match[2].trim()}</span>
      `;
    }

    function renderLives(listElement, lives) {
      listElement.innerHTML = "";

      if (lives.length === 0) {
        renderEmpty(listElement);
        return;
      }

      const livesByYear = lives
        .slice()
        .sort((a, b) => {
          if (b.live.year !== a.live.year) return b.live.year - a.live.year;
          return String(b.live.id).localeCompare(String(a.live.id));
        })
        .reduce((groups, item) => {
          const year = String(item.live.year);
          if (!groups.has(year)) groups.set(year, []);
          groups.get(year).push(item);
          return groups;
        }, new Map());

      livesByYear.forEach((yearLives, year) => {
        const yearItem = document.createElement("li");
        yearItem.className = "year-group";
        yearItem.innerHTML = `<h3 class="year-heading">${year}</h3>`;

        const yearList = document.createElement("ul");
        yearList.className = "year-live-list";

        yearLives.forEach(({ group, live }) => {
          const li = document.createElement("li");
          const a = document.createElement("a");

          a.href = LiveRegistry.detailHref(group.id, live);
          a.className = "live-title-link";
          a.innerHTML = formatLiveTitle(live.title);

          li.appendChild(a);
          yearList.appendChild(li);
        });

        yearItem.appendChild(yearList);
        listElement.appendChild(yearItem);
      });
    }

    function byType(items, type) {
      return items.filter(item => String(item.live.type || "").toUpperCase() === type);
    }

    async function init() {
      const [members, allLives] = await Promise.all([
        LiveRegistry.loadMembers(),
        LiveRegistry.loadAllLives()
      ]);
      const member = members.find(item => item.id === memberId);

      if (!member) {
        SiteCommon.showPageError("メンバーが見つかりません", "指定されたメンバー情報が見つかりませんでした。");
        return;
      }

      const memberLives = allLives.filter(({ entry, group, live }) =>
        group?.id === "individual"
        && (entry.memberId === member.id || live.memberId === member.id)
      );
      const memberLiveIds = new Set(memberLives.map(({ live }) => live.id));

      SiteCommon.setDocumentTitle(`${member.name} | v v v v v v LIVE MEMORY`);
      document.getElementById("member-name").textContent = member.name;
      document.getElementById("member-name-breadcrumb").textContent = member.name;

      const liveItems = byType(memberLives, "LIVE");
      const stageItems = byType(memberLives, "STAGE");
      const eventItems = byType(memberLives, "EVENT");

      document.getElementById("live-count").textContent = `登録数：${liveItems.length}`;
      document.getElementById("stage-count").textContent = `登録数：${stageItems.length}`;
      document.getElementById("event-count").textContent = `登録数：${eventItems.length}`;

      renderLives(document.getElementById("live-list"), liveItems);
      renderLives(document.getElementById("stage-list"), stageItems);
      renderLives(document.getElementById("event-list"), eventItems);

      const searchResults = memberLives.flatMap(({ group, live }) =>
        LiveRegistry.buildLiveSearchResults(group, live)
      );
      searchResults.push(
        ...await MemorySearch.loadMemoryResults(item => {
          const parts = String(item.memoryId || "").split(":");
          return parts[1] === "individual" && memberLiveIds.has(parts[2]);
        })
      );

      const input = document.getElementById("member-search");
      const container = document.getElementById("member-search-results");
      MemorySearch.bindMemberFilteredResults(input, container, searchResults);
    }

    init();
  </script>
</body>
</html>
