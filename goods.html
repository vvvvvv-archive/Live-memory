<body>
  <main>
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <section class="lead-card">
      <h1 id="goods-title"></h1>
      <p id="goods-price"></p>
    </section>

    <section class="section-block">
      <div class="section-heading">
        <h2>思い出</h2>
      </div>

      <div id="giscus-container"></div>
      <nav class="song-navigation">
        <a id="back-link" href="#">グッズ一覧へ戻る</a>
      </nav>
    </section>
  </main>

  <footer>ｖｖｖｖｖｖ　LIVE MEMORY</footer>
  <script src="js/site-common.js?v=20260713-ogp"></script>
  <script src="js/comment-tools.js?v=20260713-contact-report"></script>
  <script src="js/comment-backend-config.js"></script>
  <script src="js/prototype-comments.js?v=20260717-comment-target"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const groupId = params.get("group");
    const liveId = params.get("live");
    const goodsId = params.get("goods");

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      return response.json();
    }

    function createMemoryGuidelines() {
      const guidelines = document.createElement("div");
      guidelines.className = "memory-guidelines";
      guidelines.innerHTML = `
        <h3>思い出を残すときのお願い</h3>
        <ul>
          <li>他の人や出演者を傷つける内容、公序良俗に反する内容はご遠慮ください。</li>
          <li>誰かから聞いた話ではなく、ご自身が体験した内容を書いてください。</li>
          <li>投稿前に、一度ご自身の文章を読み返してご確認ください。</li>
        </ul>
        <p>ルールを守って、<br>みんなでしあわせな思い出を共有しましょう。</p>
      `;
      return guidelines;
    }

    async function init() {
      const groups = await loadJson("data/groups.json");
      const group = groups.find(g => g.id === groupId);
      const live = await loadJson(`data/lives/${groupId}/${liveId}.json`);
      const goods = live.goods.find(item => item.id === goodsId);

      SiteCommon.setDocumentTitle(`${goods.name} | ｖｖｖｖｖｖ　LIVE MEMORY`);

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">HOME</a> &gt;
        <a href="group.html?id=${group.id}">${group.name}</a> &gt;
        <a href="live.html?group=${group.id}&live=${live.id}">${live.title}</a> &gt;
        <a href="section.html?group=${group.id}&live=${live.id}&section=goods">グッズ</a> &gt;
        ${goods.name}
      `;

      document.getElementById("goods-title").textContent = goods.name;
      document.getElementById("goods-price").textContent = goods.priceLabel || `${goods.price.toLocaleString()}円`;
      document.getElementById("back-link").href =
        `section.html?group=${groupId}&live=${liveId}&section=goods`;

      const memoryId = `goods:${groupId}:${liveId}:${goods.id}`;
      const commentContainer = document.getElementById("giscus-container");
      appendPrototypeCommentsIfEnabled(commentContainer, groupId, liveId, memoryId, {
        afterForm: [createMemoryGuidelines(), createPostManagementLink()]
      });
    }

    init();
  </script>
</body>
</html>
