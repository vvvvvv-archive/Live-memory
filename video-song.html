</section>

<section class="section-block">

<div class="section-heading">

</div>

ｖｖｖｖｖｖ　LIVE MEMORY

  <script src="js/prototype-comments.js?v=20260713-comment-ui-cleanup"></script>
  <script src="js/memory-ids.js"></script>
<script>

const params = new URLSearchParams(location.search);

const groupId=params.get("group");
const liveId=params.get("live");
const setlistId=params.get("setlist");
const songIndexParam=params.get("song");
const order=Number(params.get("order"));

async function loadJson(path){

const r=await fetch(path, { cache: "no-store" });

return await r.json();

}

function createMemoryGuidelines(){

const guidelines=document.createElement("div");

guidelines.className="memory-guidelines";

guidelines.innerHTML=`
  <h3>思い出を残すときのお願い</h3>
  <ul>
    <li>他の人や出演者を傷つける内容、公序良俗に反する内容はご遠慮ください。</li>
    <li>誰かから聞いた話ではなく、ご自身が体験した内容を書いてください。</li>
    <li>投稿前に、一度ご自身の文章を読み返してご確認ください。</li>
  </ul>
  <p>ルールを守って、<br>みんなでしあわせな思い出を共有しましょう。</p>
`;

return guidelines;

}

async function init(){

const groups=await loadJson("data/groups.json");

const group=groups.find(g=>g.id===groupId);

const live=await loadJson(`data/lives/${groupId}/${liveId}.json`);

const setlist=setlistId==="video"&&live.video?.setlist?.length
? {id:"video",songs:live.video.setlist}
: live.setlists.find(s=>s.id===setlistId);

const songIndex=songIndexParam!==null
? Number(songIndexParam)
: setlist.songs.findIndex(s=>s.order===order);

const song=setlist.songs[songIndex];

SiteCommon.setDocumentTitle(`${song.title} | 映像・円盤 | ｖｖｖｖｖｖ　LIVE MEMORY`);

document.getElementById("breadcrumb").innerHTML=`
<a href="index.html">HOME</a>
&gt;
<a href="group.html?id=${group.id}">${group.name}</a>
&gt;
<a href="live.html?group=${group.id}&live=${live.id}">
${live.title}
</a>
&gt;
<a href="video.html?group=${group.id}&live=${live.id}">
映像・円盤
</a>
&gt;
${song.title}
`;


document.getElementById("song-title").textContent=song.title;

document.getElementById("song-artist").textContent=song.note
? `${song.artist} / ${song.note}`
: song.artist;

const nav=document.getElementById("song-navigation");

const songs=setlist.songs;

const index=songIndex;

let html="";

if(index>0){

const prev=songs[index-1];

html+=`
<a href="video-song.html?group=${groupId}&live=${liveId}&setlist=${setlist.id}&song=${index - 1}&order=${prev.order}">
← ${prev.title}
</a>
`;

}

html+=`
<a href="video.html?group=${groupId}&live=${liveId}">
映像・円盤へ戻る
</a>
`;

if(index<songs.length-1){

const next=songs[index+1];

html+=`
<a href="video-song.html?group=${groupId}&live=${liveId}&setlist=${setlist.id}&song=${index + 1}&order=${next.order}">
${next.title} →
</a>
`;

}

nav.innerHTML=html;

const memoryId =
videoSongMemoryId(groupId, liveId, setlist.id, song, index);

const commentContainer = document.getElementById("giscus-container");
appendPrototypeCommentsIfEnabled(commentContainer, groupId, liveId, memoryId, {
  afterForm: [createMemoryGuidelines(), createPostManagementLink()]
});

}

init();

</script>
